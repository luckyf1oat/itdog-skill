name: Deploy Worker

on:
  push:
    branches:
      - main
      - master
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure KV namespaces exist and bind into wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONFIG_KV_TITLE: ${{ vars.CONFIG_KV_TITLE }}
          STATE_KV_TITLE: ${{ vars.STATE_KV_TITLE }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID in GitHub Secrets"
            exit 1
          fi

          CONFIG_KV_TITLE="${CONFIG_KV_TITLE:-itdog-workers-optimizer-config}"
          STATE_KV_TITLE="${STATE_KV_TITLE:-itdog-workers-optimizer-state}"

          echo "CONFIG_KV_TITLE=$CONFIG_KV_TITLE"
          echo "STATE_KV_TITLE=$STATE_KV_TITLE"

          list_resp=$(curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces?per_page=1000&page=1")

          extract_id() {
            python -c "import json,sys; d=json.loads(sys.argv[1]); t=sys.argv[2]; print(next((i.get('id','') for i in d.get('result',[]) if i.get('title')==t), ''))" "$1" "$2"
          }

          create_ns() {
            curl -sS -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
              --data "{\"title\":\"$1\"}"
          }

          CONFIG_KV_ID=$(extract_id "$list_resp" "$CONFIG_KV_TITLE")
          if [ -z "$CONFIG_KV_ID" ]; then
            create_resp=$(create_ns "$CONFIG_KV_TITLE")
            CONFIG_KV_ID=$(python -c "import json,sys; d=json.loads(sys.argv[1]); print((d.get('result') or {}).get('id',''))" "$create_resp")
          fi

          STATE_KV_ID=$(extract_id "$list_resp" "$STATE_KV_TITLE")
          if [ -z "$STATE_KV_ID" ]; then
            create_resp=$(create_ns "$STATE_KV_TITLE")
            STATE_KV_ID=$(python -c "import json,sys; d=json.loads(sys.argv[1]); print((d.get('result') or {}).get('id',''))" "$create_resp")
          fi

          if [ -z "$CONFIG_KV_ID" ] || [ -z "$STATE_KV_ID" ]; then
            echo "Failed to resolve KV namespace ids"
            exit 1
          fi

          python -c "import re,sys; config_id,state_id=sys.argv[1],sys.argv[2]; p='wrangler.toml'; t=open(p,'r',encoding='utf-8').read(); t=re.sub(r'(\\[\\[kv_namespaces\\]\\]\\s*\\n\\s*binding\\s*=\\s*\"CONFIG_KV\"\\s*\\n\\s*id\\s*=\\s*\")[^\"]*(\")', lambda m: m.group(1)+config_id+m.group(2), t, flags=re.MULTILINE); t=re.sub(r'(\\[\\[kv_namespaces\\]\\]\\s*\\n\\s*binding\\s*=\\s*\"STATE_KV\"\\s*\\n\\s*id\\s*=\\s*\")[^\"]*(\")', lambda m: m.group(1)+state_id+m.group(2), t, flags=re.MULTILINE); open(p,'w',encoding='utf-8').write(t); print('Bound CONFIG_KV id:', config_id); print('Bound STATE_KV id:', state_id)" "$CONFIG_KV_ID" "$STATE_KV_ID"

      - name: Type check
        run: npm run typecheck

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
